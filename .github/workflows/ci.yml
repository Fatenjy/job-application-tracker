name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # GitHub spins up a real PostgreSQL next to the test runner — the tests
    # run against the same database engine as production, not a stand-in.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jobtracker
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: jobtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobtracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: ci-only-password
      POSTGRES_DB: jobtracker
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -v
