<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Job<span>Tracker</span></div>
    <nav class="tabs">
      <button class="tab active" data-view="board">Board</button>
      <button class="tab" data-view="jobs">Find jobs</button>
    </nav>
    <a class="api-link" href="/docs" title="API documentation">API</a>
  </header>

  <main>
    <section id="view-board" class="view">
      <div class="board" id="board"></div>
    </section>

    <section id="view-jobs" class="view hidden">
      <form id="search-form" class="search-bar">
        <input type="search" id="search-q" placeholder="Search title or company (e.g. python)..." />
        <select id="search-source">
          <option value="">All sources</option>
          <option value="remoteok">RemoteOK</option>
          <option value="arbeitnow">Arbeitnow</option>
          <option value="remotive">Remotive</option>
        </select>
        <label class="check"><input type="checkbox" id="search-remote" /> Remote only</label>
        <button type="submit" class="btn primary">Search</button>
      </form>
      <div id="job-results" class="job-list"></div>
    </section>
  </main>

  <aside id="panel" class="panel hidden">
    <div class="panel-head">
      <div>
        <h2 id="panel-title"></h2>
        <p id="panel-company" class="muted"></p>
      </div>
      <button id="panel-close" class="btn ghost" aria-label="Close">✕</button>
    </div>
    <div class="panel-body">
      <label>Status
        <select id="panel-status">
          <option value="saved">Saved</option>
          <option value="applied">Applied</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
        </select>
      </label>
      <label>Notes
        <textarea id="panel-notes" rows="6" placeholder="Contacts, salary discussed, next steps..."></textarea>
      </label>
      <a id="panel-url" class="btn ghost" target="_blank" rel="noopener">Open job posting ↗</a>
      <div class="panel-actions">
        <button id="panel-delete" class="btn danger">Delete</button>
        <button id="panel-save" class="btn primary">Save</button>
      </div>
    </div>
  </aside>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
